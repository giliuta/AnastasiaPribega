[phases.setup]
nixPkgs = ["nodejs-18_x", "yarn", "python311"]

[phases.install]
cmds = [
    "cd frontend && yarn install",
    "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["cd frontend && yarn build"]

[start]
cmd = "cd backend && python -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000}"
